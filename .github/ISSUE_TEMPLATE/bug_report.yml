name: Bug Report
description: Create a report to help us improve the Synaptiq AI Agent.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: android-version
    attributes:
      label: Android Version
      description: What version of Android are you running? (e.g., Android 13)
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device Model
      description: What device are you using? (e.g., Samsung Galaxy S23)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open the app
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logcat / Error Messages
      description: If applicable, add logcat output or error messages to help explain your problem.
    validations:
      required: false
